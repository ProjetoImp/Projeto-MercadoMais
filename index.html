<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado+</title>
    <link rel="stylesheet" href="/assets/css/index.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap">
</head>

<body>

    <header>
        <div class="logo-icon"> 🛒 </div>
        <div class="logo-text">
            <img src="/assets/imgs/logo-claro.png" class="logo-area" alt="Logo Mercado+" />
        </div>

        <div class="date">

        </div>
    </header>

    <main>
        <div>
            <img src="/assets/imgs/logo-escuro.png" class="logo-topo" alt="Logo Mercado+" />
            <h2>Bem-vindos ao Mercado+</h2>
            <p class="subtítulo">Seu sistema completo para gestão do seu negócio</p>
        </div>

        <section class="cards">
            <a href="/assets/pages/products.html"><div class="card">
                <div class="icon verde"> 📦 </div>

            </div></a>

                <div class="icon laranja">👥</div>
                <h3>Gerenciar clientes</h3>
                <p>Organize suas base de clientes</p>
            </div>

            <div class="card">
                <div class="icon gráfico">📊</div>
                <h3>Gerenciar vendas</h3>
                <p>Registre e acompanhe suas vendas</p>

    <script src="/assets/js/index.js">
